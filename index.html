<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets>
      <img id="card" src="coli.avif" />
      <a-asset-item id="avatarModel" src="colosseum/sad.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane>
      <!-- debug: should aparecer como um cubo vermelho se o tracking estiver funcionando -->

      <a-gltf-model id="modelo" rotation="0 0 0" position="0 -0.2 1" scale="0.003 0.003 0.003" src="#avatarModel"  material="color: #C2A27B"
        crossorigin="anonymous" shadow="cast: true; receive: true"
        animation="property: position; from: 0 -0.2 1; to: 0 0 1; dur: 1200; easing: easeOutCubic"
        animation__scale="property: scale; from: 0.001 0.001 0.001; to: 0.003 0.003 0.003; dur: 1200; easing: easeOutBack"
        animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
      </a-gltf-model>
    </a-entity>
  </a-scene>
</body>


</html>
